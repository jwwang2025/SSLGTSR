seed: 42
device: "cuda"   # "cuda" or "cpu"

data:
  interactions_file: "interactions.txt"
  social_file: "social.txt"
  is_social_directed: false
  val_ratio: 0.1
  test_ratio: 0.1
  min_user_interactions: 5

model:
  emb_dim: 64
  n_layers: 4
  transformer:
    n_heads: 2
    dropout: 0.1
  # Attention sampling (Section 3.2)
  attn_sample_size: 15
  # Global topology injection (3 PEs): shortest-path / degree / PageRank
  # Default disabled to keep the original baseline behavior.
  topo_pe:
    enabled: false
    spd_enabled: true
    deg_enabled: true
    pr_enabled: true
    # SPD (anchor shortest-path distances)
    spd_num_anchors: 16
    spd_max_dist: 5
    spd_dist_emb_dim: 16
    spd_mlp_hidden: 64
    directed: false
    # PageRank
    pr_alpha: 0.85
    pr_max_iter: 50
  # Cross-view self-supervised learning (Section 3.5, Eq.16-17)
  # Default disabled.
  cross_view_ssl:
    enabled: false
    weight: 0.1
    n_pairs: 2048
    leaky_relu_slope: 0.2
  ssl:
    temperature: 0.2
    edge_drop_rate: 0.1
    feature_drop_rate: 0.1
    weight: 1.0e-5  # λ₁

train:
  epochs: 50
  batch_size: 1024
  lr: 0.001
  weight_decay: 0.0
  bpr_reg: 1.0e-5  # λ₂
  log_every: 20
  eval_every: 1
  topk: [10, 20]
  early_stopping_patience: 10
  num_workers: 0
  runs_dir: "runs"

